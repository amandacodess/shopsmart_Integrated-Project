<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShopSmart — Discover Products You'll Love</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#c5f0fe;           /* light blue background */
  --surface:#ffffff;      /* white sections */
  --card:#f5faff;         /* soft light blue cards */
  --border:#d6e6f5;       /* subtle border */

  --accent:#4a90e2;       /* primary blue */
  --accent2:#2c5aa0;      /* deeper navy accent */

  --text:#0b2545;         /* navy blue text */
  --muted:#5f7a99;        /* softer navy */

  --radius:14px;
  --font-display:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(11,12,16,.85);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);padding:0 32px;
  display:flex;align-items:center;gap:24px;height:64px;
}
.logo{font-family:var(--font-display);font-weight:800;font-size:1.35rem;color:var(--accent);letter-spacing:-.5px;white-space:nowrap;}
.logo span{color:var(--accent2)}
.nav-links{display:flex;gap:4px;margin-left:auto}
.nav-links a{padding:6px 14px;border-radius:8px;font-size:.875rem;color:var(--muted);text-decoration:none;transition:all .2s;}
.nav-links a:hover,.nav-links a.active{background:var(--card);color:var(--text)}
.nav-badge{margin-left:auto;background:var(--accent);color:#000;font-weight:700;font-size:.75rem;padding:4px 12px;border-radius:20px;}
.hero{padding:80px 32px 60px;text-align:center;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(245,200,66,.08) 0%,transparent 70%);}
.hero h1{font-family:var(--font-display);font-weight:800;font-size:clamp(2.2rem,5vw,4rem);line-height:1.1;margin-bottom:16px;}
.hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero p{font-size:1.05rem;color:var(--muted);max-width:500px;margin:0 auto 36px}
.search-wrap{max-width:680px;margin:0 auto;display:flex;gap:10px;align-items:center;}
.search-wrap input{flex:1;height:52px;padding:0 20px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:1rem;font-family:var(--font-body);outline:none;transition:border .2s;}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap select{height:52px;padding:0 14px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:.85rem;outline:none;cursor:pointer;}
.btn{height:52px;padding:0 24px;border-radius:12px;border:none;cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:.9rem;background:var(--accent);color:#000;transition:all .2s;white-space:nowrap;}
.btn:hover{background:var(--accent2);color:#fff;transform:translateY(-1px)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:transparent;transform:none}
.filters{padding:24px 32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.filter-label{font-size:.8rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.08em}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:.8rem;color:var(--muted);cursor:pointer;transition:all .18s;background:transparent;}
.chip:hover,.chip.active{border-color:var(--accent);color:var(--accent);background:rgba(245,200,66,.08);}
.sort-select{margin-left:auto;height:36px;padding:0 12px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:.8rem;outline:none;cursor:pointer;}
main{padding:0 32px 80px}
.section-title{font-family:var(--font-display);font-weight:700;font-size:1.25rem;margin-bottom:20px;display:flex;align-items:center;gap:12px;}
.section-title span{color:var(--muted);font-size:.85rem;font-family:var(--font-body);font-weight:400}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin-bottom:40px;}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;}
.product-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 12px 40px rgba(245,200,66,.12);}
.img-placeholder{width:100%;height:180px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
.card-body{padding:14px}
.card-category{font-size:.7rem;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.card-name{font-size:.88rem;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px;}
.card-meta{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-price{font-family:var(--font-display);font-weight:700;font-size:1rem;color:var(--accent)}
.card-rating{display:flex;align-items:center;gap:4px;font-size:.78rem;color:var(--muted);}
.star{color:#f5c842;font-size:.8rem}
.card-badge{position:absolute;top:10px;right:10px;background:var(--accent2);color:#fff;font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:8px;}
.rec-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:40px;}
.rec-input-row{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.rec-input-row input{flex:1;min-width:200px;height:44px;padding:0 16px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font-body);font-size:.9rem;outline:none;transition:border .2s;}
.rec-input-row input:focus{border-color:var(--accent)}
.rec-input-row select{height:44px;padding:0 14px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:.85rem;outline:none;cursor:pointer;}
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;}
.rec-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s;cursor:pointer;}
.rec-card:hover{border-color:var(--accent2)}
.rec-img{width:100%;height:130px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:2rem;}
.rec-card-body{padding:10px}
.rec-card-name{font-size:.78rem;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.sim-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px}
.sim-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.pagination{display:flex;justify-content:center;gap:8px;margin-top:32px;flex-wrap:wrap}
.page-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.85rem;transition:all .2s;}
.page-btn:hover,.page-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);align-items:center;justify-content:center;}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;max-width:520px;width:calc(100% - 40px);padding:32px;position:relative;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-close{position:absolute;top:16px;right:16px;background:var(--surface);border:none;color:var(--muted);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:color .2s;}
.modal-close:hover{color:var(--text)}
.modal h2{font-family:var(--font-display);font-weight:700;font-size:1.2rem;margin-bottom:10px}
.modal-price{font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--accent);margin-bottom:8px}
.modal-meta{display:flex;flex-direction:column;gap:6px;font-size:.85rem;color:var(--muted)}
.modal-meta span b{color:var(--text)}
.loader{text-align:center;padding:60px;color:var(--muted);font-size:.95rem;}
.empty{text-align:center;padding:60px;color:var(--muted)}
.empty big{font-size:3rem;display:block;margin-bottom:12px}
#toast{position:fixed;bottom:24px;right:24px;z-index:300;background:var(--accent);color:#000;font-weight:700;padding:12px 20px;border-radius:10px;font-size:.875rem;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0)}
@media(max-width:640px){
  nav{padding:0 16px}
  .hero{padding:48px 16px 36px}
  main,.filters{padding-left:16px;padding-right:16px}
  .search-wrap{flex-wrap:wrap}
}
</style>
</head>
<body>

<nav>
  <div class="logo">Shop<span>Smart</span></div>
  <div class="nav-links">
    <a href="/" class="active">Store</a>
    <a href="/admin">Admin</a>
  </div>
  <div class="nav-badge" id="navCount">Loading…</div>
</nav>

<section class="hero">
  <h1>Find Products<br/>You'll <em>Actually</em> Love</h1>
  <p>AI-powered recommendations + lightning-fast search</p>
  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="Search products, brands, categories…"/>
    <select id="algoSelect">
      <option value="linear">Linear O(n)</option>
      <option value="binary">Binary O(log n)</option>
    </select>
    <button class="btn" onclick="doSearch()">Search</button>
    <button class="btn btn-outline" onclick="clearSearch()">Clear</button>
  </div>
</section>

<div class="filters">
  <span class="filter-label">Category:</span>
  <button class="chip active" onclick="setCategory(this,'')">All</button>
  <div id="catChips" style="display:flex;gap:8px;flex-wrap:wrap"></div>
  <select class="sort-select" id="sortSelect" onchange="loadProducts()">
    <option value="ratings">↓ Rating</option>
    <option value="discount_price">↓ Price</option>
    <option value="no_of_ratings">↓ Popularity</option>
  </select>
</div>

<main>

  <div style="margin-bottom:40px">
    <div class="section-title">🔥 Trending Now <span>High ratings · Most reviewed</span></div>
    <div id="trendGrid" class="product-grid"><div class="loader">Loading trending…</div></div>
  </div>

  <div class="rec-section">
    <div class="section-title">🤖 AI Recommendations <span id="recModeLabel">Hybrid · TF-IDF + SVD</span></div>
    <div class="rec-input-row">
      <input id="recInput" type="text" placeholder="Enter a product name to get similar products…"/>
      <select id="recMode" onchange="updateModeLabel()">
        <option value="hybrid">Hybrid (TF-IDF + SVD)</option>
        <option value="content">Content Only (TF-IDF)</option>
      </select>
      <button class="btn" onclick="getRecommendations()">Recommend</button>
    </div>
    <div id="recGrid" class="rec-grid"></div>
  </div>

  <div class="section-title" id="gridTitle">All Products <span id="gridCount"></span></div>
  <div id="productGrid" class="product-grid"><div class="loader">Loading products…</div></div>
  <div id="pagination" class="pagination"></div>

</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="mName"></h2>
    <div class="modal-price" id="mPrice"></div>
    <div class="modal-meta" id="mMeta"></div>
    <br/>
    <button class="btn" style="width:100%" onclick="recFromModal()">Find Similar Products</button>
  </div>
</div>

<div id="toast"></div>

<script>
var STORE = {};
var currentPage = 1;
var currentCat = '';
var currentSearch = false;
var PER_PAGE = 20;
var modalName = '';

window.addEventListener('DOMContentLoaded', function() {
  loadCats();
  loadTrending();
  loadProducts();
});

// ── CATEGORIES ──
function loadCats() {
  fetch('/api/categories').then(function(r){ return r.json(); }).then(function(cats) {
    var wrap = document.getElementById('catChips');
    wrap.innerHTML = '';
    cats.slice(0,10).forEach(function(c) {
      var btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = c;
      btn.setAttribute('data-cat', c);
      btn.onclick = function(){ setCategory(btn, c); };
      wrap.appendChild(btn);
    });
  }).catch(function(){});
}

function setCategory(el, cat) {
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  currentCat = cat;
  currentPage = 1;
  currentSearch = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('gridTitle').innerHTML = 'All Products <span id="gridCount"></span>';
  loadProducts();
}

// ── SEARCH ──
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

function doSearch() {
  var q = document.getElementById('searchInput').value.trim();
  var algo = document.getElementById('algoSelect').value;
  if (!q) return;
  currentSearch = true;
  var grid = document.getElementById('productGrid');
  grid.innerHTML = '<div class="loader">Searching…</div>';
  fetch('/api/search?q=' + encodeURIComponent(q) + '&algo=' + algo)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      document.getElementById('gridTitle').innerHTML = 'Search: "' + q + '" <span>' + data.count + ' results (' + algo + ')</span>';
      document.getElementById('pagination').innerHTML = '';
      document.getElementById('navCount').textContent = data.count + ' found';
      renderCards(grid, data.results);
    })
    .catch(function(e) {
      grid.innerHTML = '<div class="empty"><big>⚠</big>Search error</div>';
    });
}

function clearSearch() {
  currentSearch = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('gridTitle').innerHTML = 'All Products <span id="gridCount"></span>';
  currentPage = 1;
  loadProducts();
}

// ── PRODUCTS ──
function loadProducts() {
  var grid = document.getElementById('productGrid');
  grid.innerHTML = '<div class="loader">Loading products…</div>';
  var sort = document.getElementById('sortSelect').value;
  var url = '/api/products?page=' + currentPage + '&per_page=' + PER_PAGE + '&sort=' + sort;
  if (currentCat) url += '&category=' + encodeURIComponent(currentCat);
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      document.getElementById('navCount').textContent = data.total + ' products';
      var gc = document.getElementById('gridCount');
      if (gc) gc.textContent = data.total + ' items';
      renderCards(grid, data.products);
      renderPages(data.total, data.page);
    })
    .catch(function() {
      grid.innerHTML = '<div class="empty"><big>⚠</big>Could not load</div>';
    });
}

// ── TRENDING ──
function loadTrending() {
  fetch('/api/trending')
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var grid = document.getElementById('trendGrid');
      if (!data || !data.length) { grid.innerHTML = ''; return; }
      renderCards(grid, data);
    })
    .catch(function() {
      document.getElementById('trendGrid').innerHTML = '';
    });
}

// ── RENDER CARDS ──
function renderCards(grid, products) {
  if (!products || products.length === 0) {
    grid.innerHTML = '<div class="empty"><big>🔍</big>No products found</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < products.length; i++) {
    var p = products[i];
    STORE[p.id] = p;
    html += buildCard(p);
  }
  grid.innerHTML = html;
}

function buildCard(p) {
  var emoji = getEmoji(p.category);
  var dp = p.discount_price || 0;
  var ap = p.actual_price || 0;
  var price = dp > 0 ? ('&#8377;' + fmtNum(dp)) : (ap > 0 ? ('&#8377;' + fmtNum(ap)) : '&mdash;');
  var disc = (ap > 0 && dp > 0) ? Math.round((1 - dp/ap)*100) : 0;
  var badge = disc > 10 ? '<div class="card-badge">' + disc + '% OFF</div>' : '';
  var rat = p.ratings || 0;
  var ratStr = rat > 0 ? rat.toFixed(1) : '&mdash;';
  var id = String(p.id);
  return '<div class="product-card" onclick="openModal(\'' + id + '\')">' +
    badge +
    '<div class="img-placeholder">' + emoji + '</div>' +
    '<div class="card-body">' +
    '<div class="card-category">' + safeStr(p.category) + '</div>' +
    '<div class="card-name">' + safeStr(p.name) + '</div>' +
    '<div class="card-meta">' +
    '<div class="card-price">' + price + '</div>' +
    '<div class="card-rating"><span class="star">&#9733;</span>' + ratStr + '</div>' +
    '</div></div></div>';
}

// ── MODAL ──
function openModal(id) {
  var p = STORE[id];
  if (!p) return;
  modalName = p.name || '';
  var dp = p.discount_price || 0;
  var ap = p.actual_price || 0;
  var disc = (ap > 0 && dp > 0) ? Math.round((1 - dp/ap)*100) : 0;
  var rat = p.ratings || 0;
  var nr = p.no_of_ratings || 0;
  document.getElementById('mName').textContent = p.name || '';
  document.getElementById('mPrice').innerHTML = dp > 0 ? ('&#8377;' + fmtNum(dp)) : '&mdash;';
  var meta = '<span><b>Category:</b> ' + safeStr(p.category) + '</span>' +
    '<span><b>Rating:</b> &#9733; ' + (rat > 0 ? rat.toFixed(1) : '&mdash;') + ' (' + fmtNum(nr) + ' reviews)</span>';
  if (ap > 0) {
    meta += '<span><b>MRP:</b> <s>&#8377;' + fmtNum(ap) + '</s>';
    if (disc > 0) meta += ' &middot; <span style="color:var(--accent2)">' + disc + '% off</span>';
    meta += '</span>';
  }
  document.getElementById('mMeta').innerHTML = meta;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

function recFromModal() {
  closeModal();
  document.getElementById('recInput').value = modalName;
  document.getElementById('recInput').scrollIntoView({ behavior: 'smooth' });
  getRecommendations();
}

// ── RECOMMENDATIONS ──
function updateModeLabel() {
  var mode = document.getElementById('recMode').value;
  document.getElementById('recModeLabel').textContent = mode === 'hybrid' ? 'Hybrid · TF-IDF + SVD' : 'Content · TF-IDF';
}

document.getElementById('recInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') getRecommendations();
});

function getRecommendations() {
  var name = document.getElementById('recInput').value.trim();
  var mode = document.getElementById('recMode').value;
  if (!name) return;
  updateModeLabel();
  var grid = document.getElementById('recGrid');
  grid.innerHTML = '<div class="loader">Getting recommendations…</div>';
  fetch('/api/recommend?name=' + encodeURIComponent(name) + '&mode=' + mode)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (!data.recommendations || data.recommendations.length === 0) {
        grid.innerHTML = '<div class="empty"><big>🤷</big>No recommendations found</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < data.recommendations.length; i++) {
        html += buildRecCard(data.recommendations[i]);
      }
      grid.innerHTML = html;
      showToast('Found ' + data.recommendations.length + ' similar products');
    })
    .catch(function() {
      grid.innerHTML = '<div class="empty"><big>⚠</big>Recommendation failed</div>';
    });
}

function buildRecCard(p) {
  var emoji = getEmoji(p.category);
  var sim = p.similarity || 0;
  var dp = p.discount_price || 0;
  var price = dp > 0 ? ('&#8377;' + fmtNum(dp)) : '&mdash;';
  var safeName = safeStr(p.name);
  var encName = encodeURIComponent(p.name || '');
  return '<div class="rec-card" onclick="document.getElementById(\'recInput\').value=decodeURIComponent(\'' + encName + '\');getRecommendations()">' +
    '<div class="rec-img">' + emoji + '</div>' +
    '<div class="rec-card-body">' +
    '<div class="rec-card-name">' + safeName + '</div>' +
    '<div style="font-size:.75rem;color:var(--accent);font-weight:700">' + price + '</div>' +
    '<div class="sim-bar"><div class="sim-fill" style="width:' + Math.round(sim*100) + '%"></div></div>' +
    '<div style="font-size:.68rem;color:var(--muted);margin-top:2px">' + Math.round(sim*100) + '% match</div>' +
    '</div></div>';
}

// ── PAGINATION ──
function renderPages(total, page) {
  var totalPages = Math.ceil(total / PER_PAGE);
  var pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  var html = '';
  var start = Math.max(1, page-2);
  var end = Math.min(totalPages, page+2);
  if (start > 1) {
    html += '<button class="page-btn" onclick="goPage(1)">1</button>';
    if (start > 2) html += '<span style="color:var(--muted)">…</span>';
  }
  for (var i = start; i <= end; i++) {
    html += '<button class="page-btn' + (i===page?' active':'') + '" onclick="goPage(' + i + ')">' + i + '</button>';
  }
  if (end < totalPages) {
    if (end < totalPages-1) html += '<span style="color:var(--muted)">…</span>';
    html += '<button class="page-btn" onclick="goPage(' + totalPages + ')">' + totalPages + '</button>';
  }
  pg.innerHTML = html;
}

function goPage(n) {
  currentPage = n;
  loadProducts();
  window.scrollTo({ top: 300, behavior: 'smooth' });
}

// ── HELPERS ──
function getEmoji(cat) {
  var c = (cat || '').toLowerCase();
  if (c.indexOf('electron') >= 0) return '📱';
  if (c.indexOf('cloth') >= 0 || c.indexOf('fashion') >= 0) return '👗';
  if (c.indexOf('book') >= 0) return '📚';
  if (c.indexOf('sport') >= 0) return '⚽';
  if (c.indexOf('beauty') >= 0 || c.indexOf('health') >= 0) return '💄';
  if (c.indexOf('home') >= 0 || c.indexOf('kitchen') >= 0) return '🏠';
  if (c.indexOf('toy') >= 0) return '🧸';
  if (c.indexOf('grocery') >= 0 || c.indexOf('food') >= 0) return '🍎';
  return '🛍';
}

function fmtNum(n) {
  return Number(n).toLocaleString('en-IN');
}

function safeStr(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}
</script>
